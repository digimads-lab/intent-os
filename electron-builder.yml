appId: com.intentos.app
productName: IntentOS
copyright: Copyright © 2026 IntentOS

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - package.json

extraMetadata:
  main: out/main/index.js

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
